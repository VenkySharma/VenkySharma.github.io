<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tutorial Feedback</title>

<link rel="stylesheet" href="/CSS/feedback.css">
</head>

<body>

<canvas id="particle-bg"></canvas>

<div class="feedback-card">

<h2>Anonymous Tutorial Feedback</h2>
<p class="subtitle">Network & Web Security Tutorial</p>

<form id="feedbackForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

<input type="text" name="topic" placeholder="Tutorial Topic (optional)">

<label>How useful was the tutorial?</label>

<div class="star-rating" id="starRating">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<input type="hidden" name="rating" id="ratingValue">

<textarea name="positive" placeholder="What did you like?"></textarea>

<textarea name="improvement" placeholder="What could be improved?"></textarea>

<button type="submit">Submit Feedback</button>

</form>

<div class="success-msg" id="successMsg">
✅ Thank you for your feedback!
</div>

</div>

<script src="/JS/feedback.js"></script>

</body>
</html>
